name: Scrape Immigration History

on:
  schedule:
    - cron: "15 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: scraper/package-lock.json

      - name: Install scraper dependencies
        run: npm --prefix scraper ci

      - name: Run scraper
        run: node scraper/scraper.js

      - name: Commit and push data updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/history_data.js data/history_data.json public/data/history_data.json data/_cache.json

          if git diff --cached --quiet; then
            echo "No data changes detected."
            exit 0
          fi

          stamp="$(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git commit -m "chore(data): update draw history (${stamp})"
          git push
